<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف محمد ومريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* الأساسيات */
        :root { --gold: #c5a059; --bg: #fdfaf7; --dark: #2c2c2c; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--dark); margin: 0; overflow-x: hidden; }

        /* بوابه الدخول الفخمة */
        #gateway { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: transform 1.2s cubic-bezier(0.7, 0, 0.3, 1); }
        #gateway.open { transform: translateY(-100%); }
        .gateway-text { color: var(--gold); font-family: 'Alex Brush', cursive; font-size: 2.5rem; margin-bottom: 20px; }
        .btn-open { padding: 15px 40px; border: 1px solid var(--gold); color: var(--gold); background: transparent; cursor: pointer; transition: 0.4s; font-size: 1.1rem; }
        .btn-open:hover { background: var(--gold); color: white; }

        /* المحتوى */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Alex Brush'; font-size: 5rem; color: var(--gold); margin: 20px 0; }
        
        .section { padding: 100px 20px; max-width: 900px; margin: auto; opacity: 0; transform: translateY(50px); transition: 1s ease-out; }
        .section.visible { opacity: 1; transform: translateY(0); }
        .section-title { font-family: 'Alex Brush'; font-size: 3.5rem; color: var(--gold); margin-bottom: 40px; }

        .timer-container { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .time-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100px; }
        .time-box span { display: block; font-size: 2rem; font-weight: bold; color: var(--gold); }

        .map-btn { display: inline-block; padding: 20px 50px; background: var(--dark); color: var(--gold); text-decoration: none; border-radius: 5px; margin-top: 30px; border: 1px solid var(--gold); transition: 0.4s; }
        .map-btn:hover { background: var(--gold); color: white; }

        footer { padding: 50px; text-align: center; font-size: 0.9rem; color: #888; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="gateway">
    <div class="gateway-text">دعوة زفاف محمد ومريم</div>
    <button class="btn-open" onclick="openInvitation()">افتح الدعوة</button>
</div>

<section class="hero">
    <div class="tag">بكل الحب ندعوكم</div>
    <h1>محمد & مريم</h1>
    <p>1 سبتمبر 2026 | فندق الفخامة</p>
    <div class="timer-container" id="timer">
        <div class="time-box"><span id="d">00</span>يوم</div>
        <div class="time-box"><span id="h">00</span>ساعة</div>
        <div class="time-box"><span id="m">00</span>دقيقة</div>
    </div>
</section>

<section class="section">
    <h2 class="section-title">ليلة العمر</h2>
    <p style="line-height: 2; font-size: 1.2rem;">يسعدنا تشريفكم لنا ومشاركتنا فرحتنا في هذه الليلة الاستثنائية. وجودكم هو ما سيكتمل به جمال حفلنا.</p>
</section>

<section class="section">
    <h2 class="section-title">الموقع</h2>
    <a href="#" class="map-btn">اضغط هنا للتوجه للموقع</a>
</section>

<footer>جميع الحقوق محفوظة © 2026</footer>

<script>
    function openInvitation() {
        document.getElementById('gateway').classList.add('open');
    }

    // Scroll Reveal
    window.addEventListener('scroll', () => {
        document.querySelectorAll('.section').forEach(s => {
            if (s.getBoundingClientRect().top < window.innerHeight * 0.8) s.classList.add('visible');
        });
    });

    // Timer
    function updateTimer() {
        const diff = new Date("September 1, 2026 18:00:00") - new Date();
        document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('h').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('m').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>
</body>
</html>
