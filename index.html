<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #8b9275; /* اللون الزيتوني للخلفية */
            font-family: 'Georgia', serif;
        }

        .phone-frame {
            width: 375px;
            height: 667px;
            background: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        /* خلفية القصر */
        .bg-castle {
            width: 100%;
            height: 100%;
            background: url('https://a123411.github.io/zafaf/castle.jpg') center/cover; /* استبدلها برابط صورتك */
            position: absolute;
            top: 0;
        }

        /* الظرف (المثلث) */
        .envelope-triangle {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 300px;
            background: #f4f1ea;
            clip-path: polygon(0% 100%, 0% 100%, 100% 100%, 100% 100%, 50% 0%);
            display: flex;
            justify-content: center;
            padding-top: 50px;
            transition: clip-path 0.5s ease;
        }

        /* الختم الشمعي */
        .wax-seal {
            width: 100px;
            height: 100px;
            background: url('https://a123411.github.io/zafaf/seal.png') center/contain no-repeat; /* استبدلها برابط الختم */
            cursor: pointer;
            z-index: 10;
        }

        .open-text {
            position: absolute;
            bottom: 30px;
            font-size: 14px;
            letter-spacing: 2px;
            color: #555;
            cursor: pointer;
        }

        /* عند الفتح */
        .opened .envelope-triangle {
            clip-path: polygon(0% 100%, 0% 0%, 100% 0%, 100% 100%, 50% 100%);
        }
    </style>
</head>
<body>

    <div class="phone-frame" id="card">
        <div class="bg-castle"></div>
        <div class="envelope-triangle" onclick="this.parentElement.classList.add('opened')">
            <div class="wax-seal"></div>
            <div class="open-text">Open</div>
        </div>
    </div>

</body>
</html>
