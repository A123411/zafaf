<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حفل زفاف محمد ومريم</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; padding: 0; background-color: #fcfaf5; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* --- 1. قسم البداية (الظرف) --- */
        #intro { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #e8e2d4; transition: 1s; }
        .envelope { width: 200px; height: 150px; background: #dcd0b8; cursor: pointer; border-radius: 5px; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .envelope::after { content: 'M & M'; font-family: 'Alex Brush'; font-size: 2rem; color: #5d4e33; }

        /* --- 2. محتوى الدعوة (يظهر بعد الفتح) --- */
        #main-content { display: none; text-align: center; padding: 50px 20px; }
        .section { min-height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #eee; }
        h1 { font-family: 'Alex Brush'; font-size: 4rem; color: #b8860b; }
        .divider { width: 50px; height: 2px; background: #b8860b; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="intro">
        <div class="envelope" onclick="showInvitation()"></div>
        <p>اضغط لفتح الدعوة</p>
    </div>

    <div id="main-content">
        <div class="section" data-aos="fade-up">
            <h1>محمد & مريم</h1>
            <div class="divider"></div>
            <p>يتشرف العروسان بدعوتكم لحضور حفل الزفاف</p>
        </div>

        <div class="section" data-aos="zoom-in">
            <h2>موعدنا</h2>
            <p>1 سبتمبر 2026</p>
        </div>

        <div class="section" data-aos="fade-right">
            <h2>مكان الحفل</h2>
            <p>فندق فور سيزونز - القاهرة</p>
            <a href="#" style="background: #b8860b; color: white; padding: 10px 30px; border-radius: 30px; text-decoration: none;">موقع القاعة</a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        function showInvitation() {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            AOS.init(); // تفعيل الحركات
        }
    </script>
</body>
</html>
