<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        body { font-family: 'Amiri', serif; background-color: #F8F4F0; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body x-data="{ open: false }">

    <div x-show="!open" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#F8F4F0]">
        <div @click="open = true" class="cursor-pointer text-center">
            <div class="w-24 h-24 border-2 border-yellow-600 rounded-full flex items-center justify-center mb-6 mx-auto">
                <span class="text-yellow-700">الختم</span>
            </div>
            <p class="text-xl">اضغط لفتح الدعوة</p>
        </div>
    </div>

    <div x-show="open" x-cloak class="p-6 max-w-lg mx-auto space-y-8">
        
        <div class="text-center py-10">
            <h1 class="text-5xl font-bold mb-4">زين & ملك</h1>
            <p class="text-lg">بكل حب ننتظر حضوركم لتشاركونا أجمل ليلة</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="card text-center"><div class="text-3xl font-bold">110</div><div>يوم</div></div>
            <div class="card text-center"><div class="text-3xl font-bold">21</div><div>ساعة</div></div>
            <div class="card text-center"><div class="text-3xl font-bold">42</div><div>دقيقة</div></div>
            <div class="card text-center"><div class="text-3xl font-bold">56</div><div>ثانية</div></div>
        </div>

        <div class="space-y-4">
            <h2 class="text-2xl text-center">برنامج الحفل</h2>
            <div class="card">
                <p class="font-bold">5:00 م - الاستقبال</p>
                <p class="text-sm">ترحيب بالضيوف ومشروبات ترحيبية</p>
            </div>
            <div class="card">
                <p class="font-bold">6:30 م - عقد القران</p>
                <p class="text-sm">مراسم العقد المباركة</p>
            </div>
        </div>

        <div class="card text-center">
            <h2 class="text-xl font-bold mb-2">مكان الحفل</h2>
            <p>فندق هيلتون، الساحل الشمالي، مصر</p>
        </div>

    </div>
</body>
</html>
