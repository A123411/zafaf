<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف | محمد & مريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Cairo:wght@200;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        :root { --gold: #c5a059; --dark: #1a1a1a; --cream: #f9f7f2; }
        body { margin: 0; background: var(--cream); font-family: 'Cairo', sans-serif; color: var(--dark); overflow-x: hidden; }
        
        /* Hero Section */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid #ddd; }
        .hero h1 { font-family: 'Amiri', serif; font-size: 5rem; color: var(--gold); margin: 20px 0; }
        
        /* Sections */
        .section { padding: 150px 10%; min-height: 60vh; display: flex; flex-direction: column; justify-content: center; }
        .section-title { font-family: 'Amiri', serif; font-size: 3rem; color: var(--gold); margin-bottom: 50px; }
        p { font-size: 1.3rem; line-height: 2.2; max-width: 800px; }
        
        /* Grid Layout */
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 50px; }
        .card { padding: 40px; background: #fff; border: 1px solid #eee; transition: 0.5s; }
        .card:hover { border-color: var(--gold); }
        
        .footer { padding: 100px; text-align: center; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<section class="hero">
    <div data-aos="fade-up" data-aos-duration="2000">
        <p>بكل مودة، ندعوكم لمشاركتنا</p>
        <h1>محمد & مريم</h1>
        <p>1 سبتمبر 2026</p>
    </div>
</section>

<section class="section" data-aos="fade-up">
    <h2 class="section-title">حكايتنا</h2>
    <p>بدأت من نظرة، واكتملت بقرار، واليوم نجتمع لنكتب الفصل الأجمل في حياتنا. حضوركم يعني لنا اكتمال الفرحة.</p>
</section>

<section class="section" data-aos="fade-up">
    <h2 class="section-title">تفاصيل اليوم</h2>
    <div class="details-grid">
        <div class="card"><h3>الاستقبال</h3><p>الساعة 6:00 مساءً</p></div>
        <div class="card"><h3>العشاء</h3><p>الساعة 9:00 مساءً</p></div>
    </div>
</section>

<footer class="footer">
    <h2 class="section-title">ننتظركم</h2>
    <p>بوجودكم تكتمل ليلتنا.</p>
</footer>

<script>
    AOS.init({ once: true });
</script>
</body>
</html>
