<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف محمد ومريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Amiri&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            height: 100vh;
            background: #141815 url('https://images.unsplash.com/photo-1546182990-dffeafbe841d?q=80&w=1200') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        /* --- الظرف الكبير --- */
        #envelope-area {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 280px;
            background: #f6f3eb;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.8s ease;
            z-index: 10;
        }

        /* غطاء الظرف */
        #envelope-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 200px solid transparent;
            border-right: 200px solid transparent;
            border-top: 130px solid #e5e0d4;
        }

        .wax-seal {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fce0ad 0%, #c4a46a 50%, #91733b 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Alex Brush', cursive;
            font-size: 2.5rem;
            color: #453414;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 2px dashed rgba(74, 56, 23, 0.3);
        }

        .click-text {
            position: absolute;
            bottom: -50px;
            color: white;
            font-size: 1.2rem;
            text-shadow: 0 2px 5px black;
        }

        /* --- محتوى الدعوة --- */
        #invitation-content {
            display: none;
            width: 90%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Alex Brush', cursive; color: #91733b; font-size: 3rem; }
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.5rem; color: #333; margin: 20px 0; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 30px;
            background: #91733b;
            color: white;
            text-decoration: none;
            border-radius: 30px;
        }
    </style>
</head>
<body>

    <div id="envelope-area" onclick="openInv()">
        <div class="wax-seal">M&M</div>
        <div class="click-text">اضغط لفتح الدعوة</div>
    </div>

    <div id="invitation-content">
        <h1>Mohamed & Mariam</h1>
        <p class="arabic-text">يسعدنا دعوتكم لمشاركتنا ليلة العمر</p>
        <p>التاريخ: 1 سبتمبر 2026</p>
        <p>المكان: فندق فور سيزونز القاهرة</p>
        <a href="#" class="btn">تأكيد الحضور</a>
    </div>

    <script>
        function openInv() {
            document.getElementById('envelope-area').style.transform = 'scale(2) translateY(100px)';
            document.getElementById('envelope-area').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('envelope-area').style.display = 'none';
                document.getElementById('invitation-content').style.display = 'block';
            }, 800);
        }
    </script>
</body>
</html>
