<!-- استبدل قسم introOverlay بالكامل بهذا الكود -->
<div id="introOverlay">
    <div id="petalContainer"></div>
    <div class="envelope-container">
        <div class="envelope-flap"></div> <!-- الغطاء الذي سيفتح -->
        <div class="envelope-body">
            <div class="wax-seal" onclick="openInvitation()"></div>
        </div>
        <div class="open-instruction" onclick="openInvitation()">اضغط لفتح الدعوة</div>
    </div>
</div>

<style>
    /* تحديثات الظرف السينمائية */
    .envelope-container {
        position: relative;
        width: 300px;
        height: 200px;
        background: #e5dfd2;
        transition: all 1s ease-in-out;
        z-index: 20;
    }

    .envelope-flap {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #dcd6c8;
        clip-path: polygon(0 0, 100% 0, 50% 50%);
        transition: transform 0.8s ease;
        transform-origin: top;
        z-index: 2;
    }

    .envelope-container.open .envelope-flap {
        transform: rotateX(180deg);
    }

    .envelope-container.open {
        transform: scale(1.5);
        opacity: 0;
        pointer-events: none;
    }

    .wax-seal {
        position: absolute;
        top: 40px; left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        /* ... باقي تنسيق الختم كما هو ... */
    }

    .open-instruction {
        position: absolute;
        bottom: -50px;
        width: 100%;
        text-align: center;
        font-family: 'Amiri', serif;
        color: var(--text-gold);
        cursor: pointer;
    }
</style>

<script>
    function openInvitation() {
        const envelope = document.querySelector('.envelope-container');
        const overlay = document.getElementById('introOverlay');
        
        envelope.classList.add('open');
        
        // إخفاء الـ Overlay بعد انتهاء حركة الفتح
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1000);
    }
</script>
