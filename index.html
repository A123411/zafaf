<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف محمد ومريم</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* الأساس والديزاين الأصلي */
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:#fdf8f2;overflow-x:hidden;color:#333;opacity:0;animation:pageIn 1s ease forwards;}
@keyframes pageIn{to{opacity:1}}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at top left,#f9ead2 0%,transparent 35%),radial-gradient(circle at bottom right,#f3d8aa 0%,transparent 35%),linear-gradient(135deg,#fffaf4,#f8efe2);z-index:-3;}

/* HERO */
.hero{min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;padding:40px 20px;}
.hero-content{max-width:850px;}
.tag{display:inline-block;padding:6px 14px;border-radius:50px;background:rgba(184,134,11,.12);color:#b8860b;font-size:.9rem;margin-bottom:15px;font-weight:600;}
.hero h1{font-family:'Alex Brush';font-size:6rem;color:#b8860b;margin-bottom:10px;text-shadow:0 10px 25px rgba(184,134,11,.25);}
.sub{font-size:1.3rem;color:#666;margin:15px 0 25px;}
.date{font-size:1.1rem;color:#8a6f3d;margin-bottom:30px;font-weight:600;}

/* العداد - سطر واحد وثابت */
.timer{display:flex;justify-content:center;gap:10px;margin-bottom:30px;direction:rtl;}
.time-box{background:white;padding:15px;width:75px;border-radius:15px;box-shadow:0 10px 20px rgba(0,0,0,0.05);text-align:center;}
.time-box span{display:block;font-size:1.5rem;color:#b8860b;font-weight:bold;}
.time-box div{font-size:0.7rem;color:#888;}

/* باقي الديزاين */
.section{padding:120px 20px;text-align:center;}
.section-title{font-family:'Alex Brush';font-size:4.5rem;color:#b8860b;margin-bottom:25px;}
.love-timeline{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;margin-top:60px;}
.love-card{background:white;padding:30px 20px;border-radius:25px;box-shadow:0 20px 40px rgba(0,0,0,.08);}
.hall-card{max-width:900px;margin:50px auto 0;}
.hall-img{border-radius:25px;overflow:hidden;}
.hall-img img{width:100%;height:420px;object-fit:cover;}
.hall-btn{display:inline-block;padding:15px 35px;border-radius:50px;background:#b8860b;color:white;text-decoration:none;font-weight:bold;margin-top:20px;}
.final-message{padding:120px 20px;text-align:center;}
footer{padding:40px;text-align:center;background:#1a1a1a;color:white;}
</style>
</head>

<body>

<section class="hero">
    <div class="hero-content">
        <div class="tag">✨ دعوة زفاف</div>
        <h1>محمد & مريم</h1>
        <p class="sub">ليلة واحدة… لكنها بداية عمر كامل من الحكاية ❤️</p>
        <div class="date">1 سبتمبر 2026 — 6:00 مساءً</div>
        
        <div class="timer">
            <div class="time-box"><span id="days">00</span><div>يوم</div></div>
            <div class="time-box"><span id="hours">00</span><div>ساعة</div></div>
            <div class="time-box"><span id="mins">00</span><div>دقيقة</div></div>
            <div class="time-box"><span id="secs">00</span><div>ثانية</div></div>
        </div>
    </div>
</section>

<script>
function updateTimer() {
    const eventDate = new Date("September 1, 2026 18:00:00").getTime();
    const now = new Date().getTime();
    const diff = eventDate - now;

    if (diff > 0) {
        document.getElementById('days').innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('mins').innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById('secs').innerHTML = Math.floor((diff % (1000 * 60)) / 1000);
    }
}
setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
