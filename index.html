<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <style>
        /* إعداد الصفحة */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #8b9275; /* اللون الزيتوني للخلفية */
        }

        /* حاوية التصميم */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background-image: url('https://a123411.github.io/zafaf/castle.jpg');
            background-size: cover;
            background-position: center;
        }

        /* الظرف (المثلث) */
        .envelope-triangle {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 350px;
            background-color: #f4f1ea;
            clip-path: polygon(0% 100%, 100% 100%, 50% 0%);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding-top: 40px;
            transition: transform 1s ease-in-out;
            z-index: 10;
        }

        /* الختم الشمعي */
        .seal-img {
            width: 110px;
            height: 110px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .seal-img:hover {
            transform: scale(1.05);
        }

        /* كلمة Open */
        .open-label {
            margin-top: 10px;
            font-family: sans-serif;
            color: #888;
            font-size: 14px;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* عند الفتح - اختفاء المثلث */
        .envelope-triangle.hidden {
            transform: translateY(100%);
        }

        /* المحتوى الداخلي الذي يظهر بعد الفتح */
        .content-area {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="content-area">
            <h1>أهلاً بكم في زفافنا</h1>
        </div>

        <div class="envelope-triangle" id="envelope">
            <img src="https://a123411.github.io/zafaf/seal.png" class="seal-img" onclick="openEnvelope()" alt="Seal">
            <div class="open-label" onclick="openEnvelope()">Open</div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            document.getElementById('envelope').classList.add('hidden');
        }
    </script>
</body>
</html>
