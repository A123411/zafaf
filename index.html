<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دعوة زفاف</title>

<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* الأساس */
*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Cairo',sans-serif;
background:#fdf8f2;
overflow-x:hidden;
color:#333;
}

/* خلفية */
body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#f9ead2 0%,transparent 35%),
radial-gradient(circle at bottom right,#f3d8aa 0%,transparent 35%),
linear-gradient(135deg,#fffaf4,#f8efe2);
z-index:-3;
}

/* ===== HERO ===== */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

.hero-content{
max-width:850px;
}

/* الاسم في سطر واحد */
.names{
font-family:'Alex Brush';
font-size:5.5rem;
color:#b8860b;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
text-shadow:0 10px 25px rgba(184,134,11,.25);
}

/* التاريخ في سطر واحد */
.date{
margin-top:15px;
font-size:1.2rem;
color:#8a6f3d;
font-weight:600;
}

/* جملة صغيرة */
.sub{
margin-top:15px;
font-size:1.2rem;
color:#666;
}

/* العداد */
.timer{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
margin-top:25px;
}

.time-box{
background:white;
padding:15px;
width:90px;
border-radius:16px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

.time-box span{
font-size:1.8rem;
color:#b8860b;
font-weight:bold;
}

/* أقسام */
.section{
padding:100px 20px;
text-align:center;
}

.section-title{
font-family:'Alex Brush';
font-size:4rem;
color:#b8860b;
margin-bottom:25px;
}

/* القاعة */
.hall-img{
width:100%;
max-width:900px;
margin:auto;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.hall-img img{
width:100%;
height:420px;
object-fit:cover;
}

/* زر */
.hall-btn{
display:inline-block;
margin-top:20px;
padding:14px 30px;
border-radius:40px;
background:linear-gradient(135deg,#b8860b,#d4af37);
color:white;
text-decoration:none;
font-weight:bold;
}

/* 🌸 ورق ورد حقيقي */
.petal{
position:fixed;
top:-10vh;
width:18px;
height:12px;
background:linear-gradient(145deg,#ffd1dc,#ff7aa2);
border-radius:70% 30% 70% 30%;
opacity:0.8;
filter:drop-shadow(0 2px 4px rgba(0,0,0,.15));
animation:fall linear infinite;
pointer-events:none;
z-index:9999;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg) translateX(50px);}
}

/* آخر رسالة */
.end-message{
margin-top:80px;
text-align:center;
padding:60px 20px;
background:linear-gradient(135deg,#fffaf4,#f8efe2);
}

.end-message h2{
font-family:'Alex Brush';
font-size:3.5rem;
color:#b8860b;
}

.end-message p{
margin-top:15px;
font-size:1.2rem;
color:#555;
max-width:700px;
margin-inline:auto;
line-height:2;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

<div class="hero-content">

<div class="names">
محمد & مريم
</div>

<div class="sub">ليلة واحدة تبدأ منها الحكاية ❤️</div>

<div class="date">1 سبتمبر 2026 — 6:00 مساءً</div>

<div class="timer">
<div class="time-box"><span id="days">00</span><div>يوم</div></div>
<div class="time-box"><span id="hours">00</span><div>ساعة</div></div>
<div class="time-box"><span id="mins">00</span><div>دقيقة</div></div>
<div class="time-box"><span id="secs">00</span><div>ثانية</div></div>
</div>

</div>

</section>

<!-- القاعة -->
<section class="section">
<h2 class="section-title">مكان الحفل</h2>

<div class="hall-img">
<img src="https://images.unsplash.com/photo-1529634896101-1c7f3c1a5b1f">
</div>

<a class="hall-btn" href="https://maps.google.com" target="_blank">
📍 عرض الموقع
</a>

</section>

<!-- نهاية -->
<section class="end-message">

<h2>ننتظركم بكل الحب ❤️</h2>

<p>
وجودكم هو أجمل فرحة في يومنا هذا 🌸<br>
نفرح بكم ونكمل معكم أجمل بداية لحياتنا
</p>

</section>

<script>

/* عداد */
const eventDate = new Date("September 1, 2026 18:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const diff = eventDate - now;

document.getElementById('days').innerHTML = Math.floor(diff / (1000*60*60*24));
document.getElementById('hours').innerHTML = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
document.getElementById('mins').innerHTML = Math.floor((diff % (1000*60*60))/(1000*60));
document.getElementById('secs').innerHTML = Math.floor((diff % (1000*60))/1000);

},1000);

/* 🌸 ورق ورد أنظف */
for(let i=0;i<70;i++){
let petal=document.createElement("div");
petal.classList.add("petal");

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*6)+"s";
petal.style.opacity=0.4+Math.random()*0.6;
petal.style.transform="scale("+(0.6+Math.random())+")";

document.body.appendChild(petal);
}

</script>

</body>
</html>
