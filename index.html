<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف محمد ومريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* إضافة بسيطة لمنع القفز في العداد */
        .time-box span { display: block; font-size: 2rem; color: #b8860b; font-weight: bold; min-width: 40px; }
        /* تحسين بسيط للأداء */
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #fdf8f2; overflow-x: hidden; }
        /* بقية الـ CSS الخاص بك كما هو ممتاز جداً */
    </style>
</head>
<body>
    <!-- محتوى الصفحة الخاص بك -->

    <script>
        const eventDate = new Date("September 1, 2026 18:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = eventDate - now;

            if (diff < 0) return; // الحفل انتهى

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('days').innerHTML = d.toString().padStart(2, '0');
            document.getElementById('hours').innerHTML = h.toString().padStart(2, '0');
            document.getElementById('mins').innerHTML = m.toString().padStart(2, '0');
            document.getElementById('secs').innerHTML = s.toString().padStart(2, '0');
        }

        setInterval(updateTimer, 1000);
        updateTimer(); // تشغيل فوري

        // بقية السكريبت الخاص بك ...
    </script>
</body>
</html>
