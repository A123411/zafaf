<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دعوة زفاف محمد ومريم</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* الأساس - الحفاظ على الديزاين */
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:#fdf8f2;color:#333;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at top left,#f9ead2 0%,transparent 35%),radial-gradient(circle at bottom right,#f3d8aa 0%,transparent 35%),linear-gradient(135deg,#fffaf4,#f8efe2);z-index:-3;}

/* Hero */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;}
.tag{background:rgba(184,134,11,.12);color:#b8860b;padding:5px 15px;border-radius:50px;font-size:0.9rem;margin-bottom:15px;}

/* تكبير اسم العريسين بدون النزول لسطر جديد */
.hero h1{font-family:'Alex Brush';font-size:5rem;color:#b8860b;margin-bottom:10px;white-space:nowrap;}

.sub{font-size:1.3rem;color:#555;margin-bottom:20px;}
.date{font-size:1.1rem;color:#8a6f3d;margin-bottom:25px;font-weight:bold;}

/* العداد - تكبير الخانات لتملأ الشاشة في سطر واحد */
.timer{display:flex;justify-content:center;gap:10px;margin-bottom:30px;width:100%;}
.time-box{background:white;padding:15px 5px;width:80px;border-radius:20px;box-shadow:0 8px 20px rgba(0,0,0,0.1);text-align:center;}
.time-box span{display:block;font-size:1.8rem;color:#b8860b;font-weight:bold;}
.time-box div{font-size:0.8rem;color:#777;margin-top:2px;}

/* مؤشر السكرول */
.scroll-indicator{margin-top:30px;color:#caa35a;font-size:0.9rem;}
</style>
</head>

<body>

<section class="hero">
    <div class="tag">✨ دعوة زفاف</div>
    <h1>محمد & مريم</h1>
    <p class="sub">ليلة واحدة… لكنها بداية عمر كامل من الحكاية ❤️</p>
    <div class="date">1 سبتمبر 2026 — 6:00 مساءً</div>
    
    <div class="timer">
        <div class="time-box"><span id="days">00</span><div>يوم</div></div>
        <div class="time-box"><span id="hours">00</span><div>ساعة</div></div>
        <div class="time-box"><span id="mins">00</span><div>دقيقة</div></div>
        <div class="time-box"><span id="secs">00</span><div>ثانية</div></div>
    </div>
    
    <div class="scroll-indicator">مرّر للأسفل ⬇️</div>
</section>

<script>
function updateTimer() {
    const eventDate = new Date("September 1, 2026 18:00:00").getTime();
    const now = new Date().getTime();
    const diff = eventDate - now;
    if (diff > 0) {
        document.getElementById('days').innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById('hours').innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById('mins').innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById('secs').innerHTML = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
    }
}
setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
